<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="نقش الاسم">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181430"/>
      <stop offset="1" stop-color="#07060A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6E4AC"/>
      <stop offset=".45" stop-color="#D9B65C"/>
      <stop offset="1" stop-color="#9A7A2E"/>
    </linearGradient>
  </defs>

  <!-- dark medallion -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="15.25" fill="none" stroke="#C8A84B" stroke-opacity=".55" stroke-width="1.5"/>

  <!-- reed pen (qalam), nib to lower-left -->
  <g transform="rotate(38 32 32)">
    <!-- barrel -->
    <path d="M26.6 13.5 Q32 8.8 37.4 13.5 L35 40.5 L29 40.5 Z" fill="url(#gold)"/>
    <!-- ferrule band -->
    <rect x="28.4" y="19.6" width="7.2" height="3" rx="1" fill="#6E5320" opacity=".6"/>
    <!-- cut nib -->
    <path d="M29 40.5 L35 40.5 L32 53.4 Z" fill="url(#gold)"/>
    <!-- nib slit -->
    <line x1="32" y1="42.5" x2="32" y2="52" stroke="#3A2A0C" stroke-width="1.05" stroke-linecap="round"/>
    <!-- barrel highlight -->
    <line x1="30.3" y1="14.5" x2="29.9" y2="39.5" stroke="#FBF1CE" stroke-opacity=".5" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ink point left by the nib -->
  <circle cx="15.6" cy="52.4" r="2.1" fill="#C8A84B"/>
</svg>
